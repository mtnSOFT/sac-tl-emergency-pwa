<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#CC0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SAC Notfall">
  <title>SAC Notfall App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__brand">
      <div class="topbar__cross" aria-hidden="true">+</div>
      <div class="topbar__titles">
        <div class="topbar__eyebrow">SAC Blüemlisalp</div>
        <h1 class="topbar__title">Notfall App</h1>
      </div>
    </div>
    <div class="topbar__version" id="version-badge">v–</div>
  </header>

  <nav class="tabs" id="tabs" role="tablist"></nav>

  <main class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Lade…</p>
    </div>
  </main>

  <div class="install-banner" id="install-banner" hidden>
    <div class="install-banner__text">
      <strong>Als App installieren</strong>
      <span id="install-hint"></span>
    </div>
    <div class="install-banner__actions">
      <button id="install-btn" hidden>Installieren</button>
      <button id="install-dismiss" aria-label="Schliessen">✕</button>
    </div>
  </div>

  <div class="update-toast" id="update-toast" hidden>
    <div>
      <strong>Neue Version verfügbar</strong>
      <span>Tippe zum Aktualisieren</span>
    </div>
    <button id="update-btn">Aktualisieren</button>
  </div>

  <div class="offline-pill" id="offline-pill" hidden>Offline</div>

  <script src="vendor/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
